<!doctype html>
<html lang="en" class="%sveltekit.theme%">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hetzner Rescaler</title>
    <script>
      // Impeccable: dashboard is dark-first. First-time visitors get
      // dark surfaces unless they (or their OS) explicitly prefer light.
      // Stored choice always wins. Subsequent runs honour whatever the
      // toggle theme.svelte.ts store last wrote.
      (function () {
        try {
          var stored = localStorage.getItem('hetzner-rescaler-theme');
          var theme = stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          if (theme === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.dataset.theme = theme;
        } catch (_) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
