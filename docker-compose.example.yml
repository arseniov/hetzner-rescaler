version: "3.8"

services:
  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    image: jonamat/hetzner-rescaler-caddy:latest
    restart: unless-stopped
    ports:
      # Single public entrypoint. Caddy routes to rescaler-api and
      # rescaler-web by path.
      - "127.0.0.1:8080:8080"
    depends_on:
      - rescaler-api
      - rescaler-web

  rescaler-api:
    build:
      context: .
    image: jonamat/hetzner-rescaler:latest
    restart: unless-stopped
    # Internal-only: Caddy talks to us. Loopback binding still works
    # because the caddy container sees this network address.
    expose:
      - "8080"
    environment:
      RESCALER_INTERNAL_TOKEN: ${RESCALER_INTERNAL_TOKEN:?set this}
      RESCALER_TOKEN_ENCRYPTION_KEY: ${RESCALER_TOKEN_ENCRYPTION_KEY:-}
      RESCALER_HTTP_ADDR: "0.0.0.0:8080"
    volumes:
      - rescaler_data:/data
    depends_on:
      - rescaler-web   # any startup order works; Go doesn't depend on it

  rescaler-web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        PUBLIC_INTERNAL_TOKEN: ${RESCALER_INTERNAL_TOKEN:?set this}
    image: jonamat/hetzner-rescaler-web:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: /data/db.sqlite
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set this}
      BETTER_AUTH_URL: http://localhost:8080
      PUBLIC_INTERNAL_TOKEN: ${RESCALER_INTERNAL_TOKEN:?set this}
    volumes:
      - rescaler_data:/data    # shares the SQLite file with rescaler-api

volumes:
  rescaler_data: